<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made Just For You</title>
    <link rel="stylesheet" href="style2s.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-hearts">
        <span>💖</span><span>💖</span><span>💖</span><span>💖</span><span>💖</span><span>💖</span>
    </div>

    <div class="screen-container">
        <h1 class="title">Made just for you</h1>
        <p class="subtitle">Tap a card to open your surprise ✨</p>
        
        <div class="card-grid">
            <div class="card" onclick="openSurprise(1)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                    <path d="M12 11.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" fill="#f48fb1" stroke="none"></path>
                </svg>
            </div>

            <div class="card" onclick="openSurprise(2)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                    <path d="M12 15a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" fill="#f48fb1" stroke="none"></path>
                </svg>
            </div>

            <div class="card" onclick="openSurprise(3)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 12 20 22 4 22 4 12"></polyline>
                    <rect x="2" y="7" width="20" height="5"></rect>
                    <line x1="12" y1="22" x2="12" y2="7"></line>
                    <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                    <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
                </svg>
            </div>

            <div class="card" onclick="openSurprise(4)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22V12"></path>
                    <path d="M12 12c-2-2-4-1-4 2s2 4 4 2"></path>
                    <path d="M12 12c2-2 4-1 4 2s-2 4-4 2"></path>
                    <path d="M12 12c0-3-2-5-4-3s-1 4 4 3"></path>
                    <path d="M12 12c0-3 2-5 4-3s1 4-4 3"></path>
                </svg>
            </div>
        </div>
    </div>

    <script src="script2s.js"></script>
</body>
</html>
